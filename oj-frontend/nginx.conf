server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ===== 동아리 홈페이지 =====
    # 별도 컨테이너(homepage)가 서빙하는 정적 사이트를 /home/ 경로로 프록시한다.
    # OJ와 같은 origin(주소:포트)을 유지해야 localStorage의 로그인 토큰(oj_token)이
    # 공유되어 두 페이지 간 로그인 상태가 이어진다.
    # ^~ 를 붙여야 아래 정적 자산 정규식(location ~* ...)보다 우선 매칭된다.
    location = /home {
        return 301 /home/;
    }
    location ^~ /home/ {
        proxy_pass http://homepage/;
        proxy_set_header Host $host;
    }

    # ===== 백엔드 API 프록시 =====
    # 홈페이지의 정적 JS가 같은 origin의 상대 경로(/api/...)로 백엔드를 호출할 수
    # 있게 한다. (OJ 프론트엔드는 기존대로 VITE_API_URL을 직접 호출한다.)
    location ^~ /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 정적 자산은 캐시, 나머지는 전부 index.html로 넘겨서 React Router가 클라이언트에서 라우팅하게 한다.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
