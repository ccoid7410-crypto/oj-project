server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 컨테이너가 재생성되면 내부 IP가 바뀌는데, nginx는 기본적으로 시작할 때 한 번만 주소를
    # 찾아둬서 일부 컨테이너만 재배포하면 502가 난다. 도커 내장 DNS(127.0.0.11)를 지정하고
    # proxy_pass에 변수를 쓰면 요청 시점마다 주소를 다시 찾아 이 문제가 사라진다.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 저사양(라즈베리파이 등) 환경에서는 CPU보다 네트워크 대역폭/응답 지연이 병목이기 쉬워서
    # gzip으로 전송량을 줄인다. 이미 압축된 포맷(woff2/이미지)은 gzip 대상에서 제외.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;

    # ===== 동아리 홈페이지 =====
    # 별도 컨테이너(homepage)가 서빙하는 정적 사이트를 /home/ 경로로 프록시한다.
    # OJ와 같은 origin(주소:포트)을 유지해야 localStorage의 로그인 토큰(oj_token)이
    # 공유되어 두 페이지 간 로그인 상태가 이어진다.
    # ^~ 를 붙여야 아래 정적 자산 정규식(location ~* ...)보다 우선 매칭된다.
    location = /home {
        return 301 /home/;
    }
    location ^~ /home/ {
        set $homepage_upstream homepage;
        rewrite ^/home/(.*)$ /$1 break;
        proxy_pass http://$homepage_upstream;
        proxy_set_header Host $host;
    }

    # ===== 백엔드 API 프록시 =====
    # OJ 프론트엔드/홈페이지 둘 다 같은 origin의 상대 경로(/api/...)로 백엔드를 호출한다.
    # 접속 주소가 IP든 도메인(mDNS .local 포함)이든 항상 페이지를 받아온 그 주소로 API를
    # 부르게 되어, 특정 기기/네트워크에서만 API 도메인을 못 찾아 실패하는 문제와 CORS
    # 문제를 둘 다 없앤다.
    location ^~ /api/ {
        # 백엔드의 배너 업로드 제한(5MB)보다 약간 여유 있게 허용한다.
        # nginx 기본값은 1MB라서 기존에는 큰 배너가 API에 도달하기 전에 차단됐다.
        client_max_body_size 6m;
        set $api_upstream api;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 채점 실시간 업데이트용 WebSocket(Socket.IO)도 같은 이유로 프록시한다.
    # Upgrade 헤더를 넘겨줘야 HTTP 연결이 WebSocket으로 전환된다.
    location ^~ /socket.io/ {
        set $api_upstream api;
        proxy_pass http://$api_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 정적 자산은 캐시, 나머지는 전부 index.html로 넘겨서 React Router가 클라이언트에서 라우팅하게 한다.
    # index.html은 새 배포의 진입점이라 캐시하지 않는다(no-cache = 매번 서버에 재검증).
    # 안 하면 브라우저가 옛 index.html로 옛 번들을 계속 불러 배포가 반영 안 되는 문제가 생긴다.
    #
    # 보안 헤더(HTML 응답 기준). nginx add_header는 하위 location에서 add_header를 다시 쓰면
    # 상위가 상속되지 않으므로, 브라우저에 노출되는 각 location마다 필요한 헤더를 직접 건다.
    # - frame-ancestors/X-Frame-Options: 클릭재킹(다른 사이트가 iframe으로 감싸 속이는 공격) 차단
    # - nosniff: 브라우저가 MIME 타입을 멋대로 추측하다 스크립트로 실행하는 것 차단
    # - CSP: 스크립트/스타일/연결 출처를 제한해 XSS 주입의 실행 범위를 좁힘.
    #   style 'unsafe-inline'은 Tailwind가 넣는 인라인 스타일 때문에 필요, 폰트는 구글 폰트 허용.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
