name: durunuri-oj

# 기본 로그 드라이버(json-file)는 로테이션이 없어서 서버를 오래 켜둘수록 로그 파일이
# 끝없이 커진다 - 디스크를 다 채우거나(라즈베리파이의 SD카드는 특히 느려짐), 로그 파일 자체가
# 커지면서 쓰기/조회가 느려져 "오래 켜두면 반응성이 떨어지는" 흔한 원인이 된다.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    # 반드시 glibc 계열(bookworm)이어야 한다 - alpine(musl)로 바꿨다가 기존 pg_data 볼륨을
    # 그대로 재사용하면, 텍스트 컬럼 인덱스가 glibc collation 기준으로 만들어져 있는데
    # musl은 그 로케일의 실제 정렬 순서가 달라서(사실상 C 순서에 가까움) 인덱스가 조용히
    # 어긋난다 - 에러 없이 조회 누락/중복 unique 통과 같은 미묘한 데이터 정합성 문제로만 나타남.
    # 이미지를 다시 바꿔야 한다면 반드시 REINDEX(또는 새 클러스터로 dump/restore)까지 같이 해야 한다.
    image: postgres:16-bookworm
    # 재부팅해도 docker 데몬이 뜨면 알아서 다시 켜지도록. (컨테이너가 죽었다가 살아나는 거지,
    # docker compose up을 매번 손으로 실행해야 하는 게 아니다.)
    restart: unless-stopped
    # 8GB급 저사양 호스트(라즈베리파이 4B 등) 기준 튜닝. shared_buffers/work_mem을 낮춰서
    # postgres가 컨테이너 메모리 상한(mem_limit) 안에서 안전하게 돌도록 한다.
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c max_connections=50
      -c effective_cache_size=384MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oj_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oj_password}
      POSTGRES_DB: ${POSTGRES_DB:-oj_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oj_user} -d ${POSTGRES_DB:-oj_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "1.0"
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # 채점 큐/pub-sub 용도로만 쓰여 데이터량이 적으니 메모리 상한을 낮게 잡는다.
    # maxmemory-policy는 반드시 noeviction이어야 한다: BullMQ는 큐 데이터가 Redis에서
    # evict되면(allkeys-lru 등) 채점 대기 중인 제출이 그냥 사라져버린다 - 메모리 부족 시엔
    # evict 대신 에러를 내는 게 훨씬 안전하다(그러면 최소한 재시도/알아챌 수 있음).
    command: redis-server --maxmemory 96mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging

  api:
    build: ./oj-backend
    restart: unless-stopped
    command: ["node", "dist/main.js"]
    env_file: ./oj-backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oj_user}:${POSTGRES_PASSWORD:-oj_password}@postgres:5432/${POSTGRES_DB:-oj_db}?schema=public
      REDIS_HOST: redis
      # 컨테이너 메모리 상한(384M)보다 여유 있게 힙을 잡아두면 OOM-kill 직전에 GC가 못 돌아
      # 급사하는 대신, V8이 스스로 컬렉션을 더 자주 돌려서 은근슬쩍 버틴다.
      NODE_OPTIONS: --max-old-space-size=320
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 컨테이너에는 스키마만 들어있고 실제 마이그레이션 적용은 기동 시 한 번 실행한다.
    # (여러 인스턴스를 띄워도 prisma migrate deploy는 안전하게 반복 실행 가능)
    entrypoint: ["sh", "-c", "npx prisma migrate deploy && node dist/main.js"]
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "1.0"
    logging: *default-logging

  judge-worker:
    build: ./oj-backend
    restart: unless-stopped
    command: ["node", "dist/main-worker.js"]
    env_file: ./oj-backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oj_user}:${POSTGRES_PASSWORD:-oj_password}@postgres:5432/${POSTGRES_DB:-oj_db}?schema=public
      REDIS_HOST: redis
      JUDGE_DOCKER_SOCK: /var/run/docker.sock
      NODE_OPTIONS: --max-old-space-size=192
      # 라즈베리파이 4B(4코어) 기준 기본값. 컴파일 단계(특히 Java/C++)가 순간적으로
      # 512MB까지 쓸 수 있어서, 2로 두면 최악의 경우 동시에 ~1GB까지 튈 수 있다.
      # 채점이 자주 밀리거나 메모리가 빠듯하면 .env에서 1로 낮출 것.
      JUDGE_CONCURRENCY: ${JUDGE_CONCURRENCY:-2}
    volumes:
      # Docker-outside-of-Docker: 워커가 형제 컨테이너(채점용)를 직접 띄우기 위함.
      # 이 소켓 마운트가 곧 호스트 root 권한과 동급이므로, 반드시 이 워커만 격리된
      # 전용 서버/VM에서 돌리고 API 서버와는 네트워크도 분리하는 걸 권장합니다.
      - /var/run/docker.sock:/var/run/docker.sock
      # 채점 코드/실행 결과를 담는 디렉토리를 호스트와 공유. 형제 컨테이너(채점용)를
      # 띄울 때 바인드 마운트 소스는 "호스트 경로"여야 하므로, 워커 컨테이너 내부 경로와
      # 호스트 경로가 이 볼륨을 통해 동일한 디렉토리를 가리키게 맞춰준다.
      # HOST_JUDGE_TMP_DIR은 이 저장소를 내려받은 절대경로 기준으로 setup.sh가 자동으로 채워준다.
      - ${HOST_JUDGE_TMP_DIR:?run ./setup.sh first to set this}:/judge-tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging: *default-logging

  frontend:
    build:
      context: ./oj-frontend
      args:
        # 비워두면(기본값) 프론트가 같은 origin의 상대 경로(/api)로 nginx를 통해 API를 부른다 -
        # 접속 주소가 IP든 도메인이든 항상 되고 CORS도 안 걸린다. 백엔드를 완전히 다른
        # 도메인에 별도로 둔 특수한 배포가 아니면 VITE_API_URL을 따로 지정할 필요가 없다.
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - api
      - homepage
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.5"
    logging: *default-logging

  # 동아리 홈페이지 (정적 사이트). 외부에 직접 포트를 열지 않고 frontend nginx가
  # /home/ 경로로 프록시한다. OJ와 같은 origin을 유지해야 localStorage의 로그인
  # 토큰(oj_token)이 공유되어 두 페이지 간 로그인 상태가 이어지기 때문이다.
  homepage:
    build: ./club-homepage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.25"
    logging: *default-logging

volumes:
  pg_data:
